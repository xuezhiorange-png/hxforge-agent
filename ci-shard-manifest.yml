  - name: provider-unit
    job: shard
    python: ["3.11", "3.12"]
    files:
      - tests/unit/test_task009_phase2_adapter.py
      - tests/unit/test_task009_phase2_canonicalization.py
    timeout: 120

  - name: golden
    job: shard
    python: ["3.11", "3.12"]
    files:
      - tests/golden/double_pipe_rating/test_golden_double_pipe.py
      - tests/golden/double_pipe_rating/test_independent_references.py
      - tests/golden/heat_balance/test_golden.py
