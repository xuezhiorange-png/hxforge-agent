  - name: integration
    job: shard
    python: ["3.11", "3.12"]
    files:
      - tests/integration/test_api.py
      - tests/integration/test_correlation_registry_workflow.py
      - tests/integration/test_double_pipe_rating.py
      - tests/integration/test_heat_balance_property_provider.py
      - tests/integration/test_revision_run_workflow.py
