  - name: pure-unit
    job: shard
    python: ["3.11", "3.12"]
    files:
      - tests/unit/test_calculation_runs.py
      - tests/unit/test_canonical_serialization.py
      - tests/unit/test_correlation_applicability.py
      - tests/unit/test_correlation_models.py
      - tests/unit/test_correlation_registry.py
      - tests/unit/test_correlation_usage.py
      - tests/unit/test_design_case_revisions.py
