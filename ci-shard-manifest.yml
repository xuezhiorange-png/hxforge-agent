version: "1"
shards:
  - name: ci
    job: shard
    python: ["3.11", "3.12"]
    files:
      - tests/ci/test_collect_acceptance.py
      - tests/ci/test_node_inventory.py
      - tests/ci/test_shard_manifest.py
      - tests/support/test_mypy_doubles.py
      - tests/support/test_property_provider_doubles.py
