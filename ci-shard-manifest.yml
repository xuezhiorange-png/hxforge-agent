      - tests/unit/test_provenance_graph.py
      - tests/unit/test_task009_catalog_hash.py
      - tests/unit/test_task009_phase1.py
      - tests/unit/test_task009_phase2_contract.py
      - tests/unit/test_task009_phase3.py
      - tests/unit/test_thermal.py
      - tests/unit/test_tube_annulus_correlations.py
    timeout: 120

  - name: coolprop-unit
    job: shard
    python: ["3.11", "3.12"]
    files:
      - tests/unit/test_double_pipe_correction_r5.py
      - tests/unit/test_double_pipe_correction_r6.py
      - tests/unit/test_double_pipe_correction_r8.py
      - tests/unit/test_double_pipe_correction_r10.py
      - tests/unit/test_double_pipe_correction_r12.py
      - tests/unit/test_double_pipe_correction_r13.py
