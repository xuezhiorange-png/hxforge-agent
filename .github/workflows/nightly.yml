name: nightly

"on":
  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  HX_TRACK: nightly
  HX_COMMIT_SHA: ${{ github.sha }}
  GITHUB_RUN_ID: ${{ github.run_id }}
  GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
  PYTHONHASHSEED: "0"
  TZ: UTC
  LC_ALL: C.UTF-8

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - name: Verify uv version
        run: test "$(uv --version | cut -d' ' -f2 | sed 's/[-+].*//')" = "0.11.25"
      - name: Check lock freshness
        run: uv lock --check
      - name: Install from lock
        run: uv sync --locked --all-extras
      - name: Verify no lock drift
        run: git diff --exit-code -- uv.lock pyproject.toml
      - run: uv run --locked ruff check .
      - run: uv run --locked ruff format --check .
      - run: uv run --locked mypy
      - run: uv run --locked pip-audit

  # ── Resolve authority: freeze main SHA ─────────────────────────────────────
  resolve-authority:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      main-sha: ${{ steps.resolve.outputs.main-sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Freeze main SHA
        id: resolve
        run: |
          MAIN_SHA="$(git rev-parse HEAD)"
          echo "main-sha=${MAIN_SHA}" >> "$GITHUB_OUTPUT"
          echo "Frozen main SHA for nightly: ${MAIN_SHA}"

  # ── Full test suite: Python 3.11 ──────────────────────────────────────────
  shard-py311:
    needs: [resolve-authority]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TRACK: nightly
      COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
      RUN_ID: ${{ github.run_id }}
      RUN_ATTEMPT: ${{ github.run_attempt }}
      PYTHON_VERSION: "3.11"
      SHARD: full
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-authority.outputs.main-sha }}
      - name: Assert frozen main SHA
        run: test "$(git rev-parse HEAD)" = "${{ needs.resolve-authority.outputs.main-sha }}"
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - name: Verify uv version
        run: test "$(uv --version | cut -d' ' -f2 | sed 's/[-+].*//')" = "0.11.25"
      - name: Install from lock
        run: uv sync --locked --all-extras
      - name: Run all tests (py3.11) with real telemetry
        run: >
          uv run --locked python -m tests.ci.run_test_shard
          --timeout=300 -q
          --junitxml=nightly-py3.11-junit.xml
          --cov=src --cov-report=xml:nightly-py3.11-coverage.xml
          tests/
      - name: Generate node inventory
        if: always()
        env:
          PYTHONPATH: "."
          HX_TRACK: nightly
          HX_COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
        run: PYTHONHASHSEED=0 TZ=UTC LC_ALL=C.UTF-8 uv run --locked pytest --collect-only -p tests.ci.collect_nodes_plugin --hx-collection-scope global --hx-node-output nightly-py3.11-nodes.json tests/
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-py3.11-results
          retention-days: 30
          path: |
            nightly-py3.11-junit.xml
            nightly-py3.11-coverage.xml
            nightly-py3.11-nodes.json
            resource-telemetry.json
            node-marker-inventory.json
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HX_COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
          HX_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Nightly CI failure – shard-py3.11 ($HX_COMMIT_SHA)" \
            --body "Nightly run failed for Python 3.11 shard.

          - **Run:** $HX_RUN_URL
          - **Commit:** $HX_COMMIT_SHA
          - **Track:** nightly

          @${{ github.actor }} please investigate." \
            --label "nightly-failure,ci"

  # ── Full test suite: Python 3.12 ──────────────────────────────────────────
  shard-py312:
    needs: [resolve-authority]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TRACK: nightly
      COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
      RUN_ID: ${{ github.run_id }}
      RUN_ATTEMPT: ${{ github.run_attempt }}
      PYTHON_VERSION: "3.12"
      SHARD: full
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-authority.outputs.main-sha }}
      - name: Assert frozen main SHA
        run: test "$(git rev-parse HEAD)" = "${{ needs.resolve-authority.outputs.main-sha }}"
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - name: Verify uv version
        run: test "$(uv --version | cut -d' ' -f2 | sed 's/[-+].*//')" = "0.11.25"
      - name: Install from lock
        run: uv sync --locked --all-extras
      - name: Run all tests (py3.12) with real telemetry
        run: >
          uv run --locked python -m tests.ci.run_test_shard
          --timeout=300 -q
          --junitxml=nightly-py3.12-junit.xml
          --cov=src --cov-report=xml:nightly-py3.12-coverage.xml
          tests/
      - name: Generate node inventory
        if: always()
        env:
          PYTHONPATH: "."
          HX_TRACK: nightly
          HX_COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
        run: PYTHONHASHSEED=0 TZ=UTC LC_ALL=C.UTF-8 uv run --locked pytest --collect-only -p tests.ci.collect_nodes_plugin --hx-collection-scope global --hx-node-output nightly-py3.12-nodes.json tests/
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-py3.12-results
          retention-days: 30
          path: |
            nightly-py3.12-junit.xml
            nightly-py3.12-coverage.xml
            nightly-py3.12-nodes.json
            resource-telemetry.json
            node-marker-inventory.json
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HX_COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
          HX_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Nightly CI failure – shard-py3.12 ($HX_COMMIT_SHA)" \
            --body "Nightly run failed for Python 3.12 shard.

          - **Run:** $HX_RUN_URL
          - **Commit:** $HX_COMMIT_SHA
          - **Track:** nightly

          @${{ github.actor }} please investigate." \
            --label "nightly-failure,ci"

  # ── Benchmark shard: only benchmark-marked tests ──────────────────────────
  benchmark:
    needs: [resolve-authority]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TRACK: nightly
      COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
      RUN_ID: ${{ github.run_id }}
      RUN_ATTEMPT: ${{ github.run_attempt }}
      PYTHON_VERSION: "3.12"
      SHARD: benchmark
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-authority.outputs.main-sha }}
      - name: Assert frozen main SHA
        run: test "$(git rev-parse HEAD)" = "${{ needs.resolve-authority.outputs.main-sha }}"
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - name: Install from lock
        run: uv sync --locked --all-extras
      - name: Run benchmark tests only
        run: |
          set +e
          uv run --locked python -m tests.ci.run_test_shard \
            --timeout=300 -q \
            -m benchmark \
            --junitxml=nightly-benchmark-junit.xml \
            tests/
          RC=$?
          set -e
          if [ "$RC" -eq 5 ]; then
            echo "No benchmark-marked tests collected (exit 5), treating as pass"
            exit 0
          fi
          exit "$RC"
      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-benchmark-results
          retention-days: 30
          path: |
            nightly-benchmark-junit.xml
            resource-telemetry.json

  # ── Golden regression ─────────────────────────────────────────────────────
  golden-regression:
    needs: [resolve-authority]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-authority.outputs.main-sha }}
      - name: Assert frozen main SHA
        run: test "$(git rev-parse HEAD)" = "${{ needs.resolve-authority.outputs.main-sha }}"
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - name: Verify uv version
        run: test "$(uv --version | cut -d' ' -f2 | sed 's/[-+].*//')" = "0.11.25"
      - name: Install from lock
        run: uv sync --locked --all-extras
      - name: Run golden regression tests
        run: >
          uv run --locked pytest -m golden
          --timeout=300 -q
          --junitxml=nightly-golden-junit.xml
          tests/
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-golden-results
          retention-days: 30
          path: nightly-golden-junit.xml
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HX_COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
          HX_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Nightly golden regression failure ($HX_COMMIT_SHA)" \
            --body "Golden correctness regression tests failed.

          - **Run:** $HX_RUN_URL
          - **Commit:** $HX_COMMIT_SHA
          - **Track:** nightly

          @${{ github.actor }} please investigate.  Golden regressions are correctness authority failures." \
            --label "nightly-failure,golden-regression,ci"

  # ── Nightly final gate ────────────────────────────────────────────────────
  final-gate:
    if: always()
    needs:
      - lint
      - resolve-authority
      - shard-py311
      - shard-py312
      - benchmark
      - golden-regression
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Nightly final gate
        run: |
          FAILED=0
          check() {
            name="$1"; result="$2"
            if [ "$result" != "success" ]; then
              echo "FAIL: $name = $result" >&2
              FAILED=1
            else
              echo "PASS: $name = success"
            fi
          }
          check "lint" "${{ needs.lint.result }}"
          check "resolve-authority" "${{ needs.resolve-authority.result }}"
          check "shard-py311" "${{ needs.shard-py311.result }}"
          check "shard-py312" "${{ needs.shard-py312.result }}"
          check "benchmark" "${{ needs.benchmark.result }}"
          check "golden-regression" "${{ needs.golden-regression.result }}"
          if [ "$FAILED" -ne 0 ]; then
            echo "NIGHTLY FINAL GATE: FAILED" >&2
            exit 1
          fi
          echo "NIGHTLY FINAL GATE: ALL PASSED"
