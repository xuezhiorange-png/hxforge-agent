name: nightly

"on":
  schedule:
    # Every day at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  HX_TRACK: nightly
  HX_COMMIT_SHA: ${{ github.sha }}
  GITHUB_RUN_ID: ${{ github.run_id }}
  GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
  PYTHONHASHSEED: "0"
  TZ: UTC
  LC_ALL: C.UTF-8

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - name: Verify uv version
        run: test "$(uv --version | cut -d' ' -f2 | sed 's/[-+].*//')" = "0.11.25"
      - name: Check lock freshness
        run: uv lock --check
      - name: Install from lock
        run: uv sync --locked --all-extras
      - name: Verify no lock drift
        run: git diff --exit-code -- uv.lock pyproject.toml
      - run: uv run --locked ruff check .
      - run: uv run --locked ruff format --check .
      - run: uv run --locked mypy
      - run: uv run --locked pip-audit

  # ── Resolve authority: freeze main SHA ─────────────────────────────────────
  resolve-authority:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      main-sha: ${{ steps.resolve.outputs.main-sha }}
    steps:
      - uses: actions/checkout@v4
      - name: Freeze main SHA
        id: resolve
        run: |
          MAIN_SHA="$(git rev-parse HEAD)"
          echo "main-sha=${MAIN_SHA}" >> "$GITHUB_OUTPUT"
          echo "Frozen main SHA for nightly: ${MAIN_SHA}"

  # ── Full test suite: Python 3.11 ──────────────────────────────────────────
  shard-py311:
    needs: [resolve-authority]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TRACK: nightly
      COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
      RUN_ID: ${{ github.run_id }}
      RUN_ATTEMPT: ${{ github.run_attempt }}
      PYTHON_VERSION: "3.11"
      SHARD: full
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-authority.outputs.main-sha }}
      - name: Assert frozen main SHA
        run: test "$(git rev-parse HEAD)" = "${{ needs.resolve-authority.outputs.main-sha }}"
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - name: Verify uv version
        run: test "$(uv --version | cut -d' ' -f2 | sed 's/[-+].*//')" = "0.11.25"
      - name: Install from lock
        run: uv sync --locked --all-extras
      - name: Run all tests (py3.11) with real telemetry
        run: >
          uv run --locked python -m tests.ci.run_test_shard
          --timeout=300 -q
          --junitxml=nightly-py3.11-junit.xml
          --cov=src --cov-report=xml:nightly-py3.11-coverage.xml
          tests/
      - name: Generate node inventory
        if: always()
        env:
          PYTHONPATH: "."
          HX_TRACK: nightly
          HX_COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
        run: PYTHONHASHSEED=0 TZ=UTC LC_ALL=C.UTF-8 uv run --locked pytest --collect-only -p tests.ci.collect_nodes_plugin --hx-collection-scope global --hx-node-output nightly-py3.11-nodes.json tests/
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-py3.11-results
          retention-days: 30
          path: |
            nightly-py3.11-junit.xml
            nightly-py3.11-coverage.xml
            nightly-py3.11-nodes.json
            resource-telemetry.json
            node-marker-inventory.json
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HX_COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
          HX_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Nightly CI failure – shard-py3.11 ($HX_COMMIT_SHA)" \
            --body "Nightly run failed for Python 3.11 shard.

          - **Run:** $HX_RUN_URL
          - **Commit:** $HX_COMMIT_SHA
          - **Track:** nightly

          @${{ github.actor }} please investigate." \
            --label "nightly-failure,ci"

  # ── Full test suite: Python 3.12 ──────────────────────────────────────────
  shard-py312:
    needs: [resolve-authority]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TRACK: nightly
      COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
      RUN_ID: ${{ github.run_id }}
      RUN_ATTEMPT: ${{ github.run_attempt }}
      PYTHON_VERSION: "3.12"
      SHARD: full
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-authority.outputs.main-sha }}
      - name: Assert frozen main SHA
        run: test "$(git rev-parse HEAD)" = "${{ needs.resolve-authority.outputs.main-sha }}"
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - name: Verify uv version
        run: test "$(uv --version | cut -d' ' -f2 | sed 's/[-+].*//')" = "0.11.25"
      - name: Install from lock
        run: uv sync --locked --all-extras
      - name: Run all tests (py3.12) with real telemetry
        run: >
          uv run --locked python -m tests.ci.run_test_shard
          --timeout=300 -q
          --junitxml=nightly-py3.12-junit.xml
          --cov=src --cov-report=xml:nightly-py3.12-coverage.xml
          tests/
      - name: Generate node inventory
        if: always()
        env:
          PYTHONPATH: "."
          HX_TRACK: nightly
          HX_COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
        run: PYTHONHASHSEED=0 TZ=UTC LC_ALL=C.UTF-8 uv run --locked pytest --collect-only -p tests.ci.collect_nodes_plugin --hx-collection-scope global --hx-node-output nightly-py3.12-nodes.json tests/
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-py3.12-results
          retention-days: 30
          path: |
            nightly-py3.12-junit.xml
            nightly-py3.12-coverage.xml
            nightly-py3.12-nodes.json
            resource-telemetry.json
            node-marker-inventory.json
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HX_COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
          HX_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Nightly CI failure – shard-py3.12 ($HX_COMMIT_SHA)" \
            --body "Nightly run failed for Python 3.12 shard.

          - **Run:** $HX_RUN_URL
          - **Commit:** $HX_COMMIT_SHA
          - **Track:** nightly

          @${{ github.actor }} please investigate." \
            --label "nightly-failure,ci"

  # ── Benchmark shard: governed benchmark authority ──────────────────────
  benchmark:
    needs: [resolve-authority]
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      TRACK: nightly
      COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
      RUN_ID: ${{ github.run_id }}
      RUN_ATTEMPT: ${{ github.run_attempt }}
      PYTHON_VERSION: "3.12"
      SHARD: benchmark
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-authority.outputs.main-sha }}
      - name: Assert frozen main SHA
        run: |
          test "$(git rev-parse HEAD)" = "${{ needs.resolve-authority.outputs.main-sha }}"
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - name: Install from lock
        run: uv sync --locked --all-extras

      # ── P0-2: fail-closed collection ───────────────────────────────────
      - name: Collect benchmark node and outcome inventories (fail-closed)
        env:
          PYTHONPATH: "."
          HX_TRACK: nightly
          HX_COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
        run: |
          set -eo pipefail
          PYTHONHASHSEED=0 TZ=UTC LC_ALL=C.UTF-8 \
          uv run --locked pytest --collect-only \
            -p tests.ci.collect_nodes_plugin \
            -p tests.ci.outcome_plugin \
            --hx-collection-scope global \
            --hx-node-output benchmark-node-inventory.json \
            tests/ 2>pytest-stderr.txt
          # Rename marker inventory to benchmark-prefixed name
          if [ -f node-marker-inventory.json ]; then
            mv node-marker-inventory.json benchmark-node-marker-inventory.json
          fi
          # Fail closed if marker inventory is missing
          if [ ! -f benchmark-node-marker-inventory.json ]; then
            echo "FAIL: benchmark-node-marker-inventory.json not generated by collection" >&2
            exit 1
          fi

      # ── Derive benchmark node set ──────────────────────────────────────
      - name: Derive benchmark node set
        id: bench-nodes
        run: |
          uv run --locked python -c "
          import json, sys
          try:
              inv = json.load(open('benchmark-node-marker-inventory.json'))
          except (FileNotFoundError, json.JSONDecodeError):
              print('count=0')
              sys.exit(0)
          nodes = sorted(nid for nid, mk in inv.get('node_markers', {}).items()
                         if 'benchmark' in mk)
          print(f'count={len(nodes)}')
          if nodes:
              with open('benchmark-node-ids.json', 'w') as f:
                  json.dump(nodes, f)
          "

      # ── P0-1: ZERO NODES path ─────────────────────────────────────────
      - name: Generate N/A authority (zero benchmark nodes)
        if: steps.bench-nodes.outputs.count == '0'
        run: |
          uv run --locked python -m tests.ci.benchmark_authority generate \
            --marker-inventory benchmark-node-marker-inventory.json \
            --node-inventory benchmark-node-inventory.json \
            --output benchmark-authority.json \
            --commit-sha "${{ needs.resolve-authority.outputs.main-sha }}" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --python-version "3.12"

      # ── P0-1: NONZERO NODES path ──────────────────────────────────────
      - name: Execute benchmark tests via Python launcher
        if: steps.bench-nodes.outputs.count != '0'
        run: |
          uv run --locked python -c "
          import json, subprocess, sys

          with open('benchmark-node-ids.json') as f:
              node_ids = json.load(f)

          cmd = [
              'uv', 'run', '--locked', 'python',
              '-m', 'tests.ci.run_test_shard',
              '--timeout=300', '-q',
              '-p', 'tests.ci.collect_nodes_plugin',
              '--hx-collection-scope', 'shard',
              '--hx-shard', 'benchmark',
              '--hx-node-output', 'benchmark-execution-node-inventory.json',
              '--junitxml=nightly-benchmark-junit.xml',
          ]
          cmd.extend(node_ids)

          result = subprocess.run(cmd, cwd='.')
          sys.exit(result.returncode)
          "

      - name: Verify benchmark evidence files exist
        if: steps.bench-nodes.outputs.count != '0'
        run: |
          set -eo pipefail
          REQUIRED="benchmark-execution-node-inventory.json pytest-outcomes.json resource-telemetry.json nightly-benchmark-junit.xml"
          MISSING=0
          for f in $REQUIRED; do
            if [ ! -f "$f" ]; then
              echo "::error::Required evidence file missing: $f"
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ]; then
            echo "::error::Cannot generate benchmark authority — evidence files missing"
            exit 1
          fi

      - name: Generate benchmark authority (nonzero nodes)
        if: steps.bench-nodes.outputs.count != '0'
        run: |
          uv run --locked python -m tests.ci.benchmark_authority execute \
            --global-marker-inventory benchmark-node-marker-inventory.json \
            --global-node-inventory benchmark-node-inventory.json \
            --execution-node-inventory benchmark-execution-node-inventory.json \
            --outcomes pytest-outcomes.json \
            --telemetry resource-telemetry.json \
            --junit nightly-benchmark-junit.xml \
            --output benchmark-authority.json \
            --commit-sha "${{ needs.resolve-authority.outputs.main-sha }}" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --python-version "3.12"

      # ── Validate authority artifact ────────────────────────────────────
      - name: Validate benchmark authority artifact
        if: always()
        run: |
          uv run --locked python -m tests.ci.benchmark_authority validate \
            --artifact benchmark-authority.json \
            --commit-sha "${{ needs.resolve-authority.outputs.main-sha }}" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --python-version "3.12"

      # ── Upload evidence (P0-1) ─────────────────────────────────────────
      - name: Upload benchmark evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-benchmark-results
          retention-days: 30
          path: |
            benchmark-authority.json
            benchmark-node-inventory.json
            benchmark-node-marker-inventory.json
            benchmark-execution-node-inventory.json
            pytest-outcomes.json
            resource-telemetry.json
            nightly-benchmark-junit.xml
            pytest-stderr.txt

  # ── Golden regression ─────────────────────────────────────────────────────
  golden-regression:
    needs: [resolve-authority]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-authority.outputs.main-sha }}
      - name: Assert frozen main SHA
        run: test "$(git rev-parse HEAD)" = "${{ needs.resolve-authority.outputs.main-sha }}"
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - name: Verify uv version
        run: test "$(uv --version | cut -d' ' -f2 | sed 's/[-+].*//')" = "0.11.25"
      - name: Install from lock
        run: uv sync --locked --all-extras
      - name: Run golden regression tests
        run: >
          uv run --locked pytest -m golden
          --timeout=300 -q
          --junitxml=nightly-golden-junit.xml
          tests/
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-golden-results
          retention-days: 30
          path: nightly-golden-junit.xml
      - name: Open issue on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HX_COMMIT_SHA: ${{ needs.resolve-authority.outputs.main-sha }}
          HX_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Nightly golden regression failure ($HX_COMMIT_SHA)" \
            --body "Golden correctness regression tests failed.

          - **Run:** $HX_RUN_URL
          - **Commit:** $HX_COMMIT_SHA
          - **Track:** nightly

          @${{ github.actor }} please investigate.  Golden regressions are correctness authority failures." \
            --label "nightly-failure,golden-regression,ci"

  # ── Nightly final gate ────────────────────────────────────────────────────
  final-gate:
    if: always()
    needs:
      - lint
      - resolve-authority
      - shard-py311
      - shard-py312
      - benchmark
      - golden-regression
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"

      - name: Install from lock
        run: uv sync --locked --all-extras

      - name: Download nightly-benchmark-results artifact
        uses: actions/download-artifact@v4
        with:
          name: nightly-benchmark-results
          path: nightly-benchmark-results
          run-id: ${{ github.run_id }}

      - name: Check job conclusions
        run: |
          FAILED=0
          check() {
            name="$1"; result="$2"
            if [ "$result" != "success" ]; then
              echo "::error::FAIL: $name = $result"
              FAILED=1
            else
              echo "PASS: $name = success"
            fi
          }
          check "lint" "${{ needs.lint.result }}"
          check "resolve-authority" "${{ needs.resolve-authority.result }}"
          check "shard-py311" "${{ needs.shard-py311.result }}"
          check "shard-py312" "${{ needs.shard-py312.result }}"
          check "benchmark" "${{ needs.benchmark.result }}"
          check "golden-regression" "${{ needs.golden-regression.result }}"
          if [ "$FAILED" -ne 0 ]; then
            echo "::error::NIGHTLY FINAL GATE: FAILED (job conclusion)"
            exit 1
          fi
          echo "All job conclusions: PASS"

      - name: Validate benchmark authority artifact
        run: |
          AUTH_FILE="nightly-benchmark-results/benchmark-authority.json"
          if [ ! -f "$AUTH_FILE" ]; then
            echo "::error::benchmark-authority.json not found at $AUTH_FILE"
            exit 1
          fi
          cp "$AUTH_FILE" benchmark-authority.json
          uv run --locked python -m tests.ci.benchmark_authority validate \
            --artifact benchmark-authority.json \
            --global-marker-inventory nightly-benchmark-results/benchmark-node-marker-inventory.json \
            --global-node-inventory nightly-benchmark-results/benchmark-node-inventory.json \
            --execution-node-inventory nightly-benchmark-results/benchmark-execution-node-inventory.json \
            --outcomes nightly-benchmark-results/pytest-outcomes.json \
            --telemetry nightly-benchmark-results/resource-telemetry.json \
            --junit nightly-benchmark-results/nightly-benchmark-junit.xml \
            --commit-sha "${{ needs.resolve-authority.outputs.main-sha }}" \
            --run-id "${{ github.run_id }}" \
            --run-attempt "${{ github.run_attempt }}" \
            --python-version "3.12"

      - name: NIGHTLY FINAL GATE
        run: |
          echo "NIGHTLY FINAL GATE: ALL PASSED"
