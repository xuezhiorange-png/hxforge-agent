          print('Main golden/benchmark separation: PASS')
          "

  # ── Aggregate + coverage: PR-head ─────────────────────────────────────────
  aggregate:
    if: github.event_name == 'pull_request' && needs.shard.result == 'success'
    needs: [shard, lint, verify-manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Download PR-head shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false
          pattern: pr-head-*-attempt*
      - name: Validate artifact identity
        run: |
          uv run --locked python -c "
          import json, sys
          from pathlib import Path
          from tests.ci.artifact_identity import verify_artifacts

          verify_artifacts(
              artifact_root=Path('artifacts'),
              manifest_path=Path('ci-shard-manifest.yml'),
              expected_track='pr-head',
              expected_commit_sha='${{ github.event.pull_request.head.sha }}',
              expected_run_id='${{ github.run_id }}',
              expected_run_attempt=int('${{ github.run_attempt }}'),
          )
          print('PR-head artifact identity gate PASS')
          "
      - name: Combine coverage
        run: |
          uv run --locked python -c "
          import shutil, sys
          from pathlib import Path
          combine_dir = Path('coverage-combine')
          combine_dir.mkdir(exist_ok=True)
          found = []
          for f in sorted(Path('artifacts').rglob('coverage-raw.*')):
              dest = combine_dir / f.name
              shutil.copy2(f, dest)
              found.append(str(f))
          if not found:
              print('ERROR: No coverage-raw files found', file=sys.stderr)
              sys.exit(1)
          print(f'Found {len(found)} coverage files')
          "
          uv run --locked coverage combine coverage-combine/coverage-raw.*
          uv run --locked coverage xml
          uv run --locked coverage report

