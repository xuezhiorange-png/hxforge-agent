  # ── Final gate (event-aware) ──────────────────────────────────────────────
  final-gate:
    if: always()
    needs:
      - lint
      - parse-manifest
      - verify-manifest
      - resolve-authority
      - shard
      - shard-merge-ref
      - shard-main
      - collect-global
      - collect-global-merge-ref
      - collect-global-main
      - verify-completeness
      - verify-completeness-merge-ref
      - verify-completeness-main
      - verify-golden-benchmark
      - verify-golden-benchmark-merge-ref
      - verify-golden-benchmark-main
      - aggregate
      - merge-ref-aggregate
      - main-aggregate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Event-aware final gate
        run: |
          echo "Event: ${{ github.event_name }}"

          FAILED=0
          check() {
            name="$1"; result="$2"; required="$3"
            if [ "$required" = "no" ]; then
              echo "SKIP: $name = $result (not required for ${{ github.event_name }})"
              return
            fi
            if [ "$result" != "success" ]; then
              echo "FAIL: $name = $result" >&2
              FAILED=1
            else
              echo "PASS: $name = success"
            fi
          }

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # PR-head + merge-ref required; main-track skipped
            check "lint" "${{ needs.lint.result }}" "yes"
            check "parse-manifest" "${{ needs.parse-manifest.result }}" "yes"
            check "verify-manifest" "${{ needs.verify-manifest.result }}" "yes"
            check "resolve-authority" "${{ needs.resolve-authority.result }}" "yes"
            check "shard" "${{ needs.shard.result }}" "yes"
            check "shard-merge-ref" "${{ needs.shard-merge-ref.result }}" "yes"
            check "shard-main" "${{ needs.shard-main.result }}" "no"
            check "collect-global" "${{ needs.collect-global.result }}" "yes"
            check "collect-global-merge-ref" "${{ needs.collect-global-merge-ref.result }}" "yes"
            check "collect-global-main" "${{ needs.collect-global-main.result }}" "no"
            check "verify-completeness" "${{ needs.verify-completeness.result }}" "yes"
            check "verify-completeness-merge-ref" "${{ needs.verify-completeness-merge-ref.result }}" "yes"
            check "verify-completeness-main" "${{ needs.verify-completeness-main.result }}" "no"
            check "verify-golden-benchmark" "${{ needs.verify-golden-benchmark.result }}" "yes"
            check "verify-golden-benchmark-merge-ref" "${{ needs.verify-golden-benchmark-merge-ref.result }}" "yes"
            check "verify-golden-benchmark-main" "${{ needs.verify-golden-benchmark-main.result }}" "no"
            check "aggregate" "${{ needs.aggregate.result }}" "yes"
            check "merge-ref-aggregate" "${{ needs.merge-ref-aggregate.result }}" "yes"
            check "main-aggregate" "${{ needs.main-aggregate.result }}" "no"
          else
            # push to main: main-track required; PR-head + merge-ref skipped
            check "lint" "${{ needs.lint.result }}" "yes"
            check "parse-manifest" "${{ needs.parse-manifest.result }}" "yes"
            check "verify-manifest" "${{ needs.verify-manifest.result }}" "yes"
            check "resolve-authority" "${{ needs.resolve-authority.result }}" "no"
            check "shard" "${{ needs.shard.result }}" "no"
            check "shard-merge-ref" "${{ needs.shard-merge-ref.result }}" "no"
            check "shard-main" "${{ needs.shard-main.result }}" "yes"
            check "collect-global" "${{ needs.collect-global.result }}" "no"
            check "collect-global-merge-ref" "${{ needs.collect-global-merge-ref.result }}" "no"
            check "collect-global-main" "${{ needs.collect-global-main.result }}" "yes"
            check "verify-completeness" "${{ needs.verify-completeness.result }}" "no"
            check "verify-completeness-merge-ref" "${{ needs.verify-completeness-merge-ref.result }}" "no"
            check "verify-completeness-main" "${{ needs.verify-completeness-main.result }}" "yes"
            check "verify-golden-benchmark" "${{ needs.verify-golden-benchmark.result }}" "no"
            check "verify-golden-benchmark-merge-ref" "${{ needs.verify-golden-benchmark-merge-ref.result }}" "no"
            check "verify-golden-benchmark-main" "${{ needs.verify-golden-benchmark-main.result }}" "yes"
            check "aggregate" "${{ needs.aggregate.result }}" "no"
            check "merge-ref-aggregate" "${{ needs.merge-ref-aggregate.result }}" "no"
            check "main-aggregate" "${{ needs.main-aggregate.result }}" "yes"
          fi

          if [ "$FAILED" -ne 0 ]; then
            echo "FINAL GATE: FAILED" >&2
            exit 1
          fi
          echo "FINAL GATE: ALL PASSED"
