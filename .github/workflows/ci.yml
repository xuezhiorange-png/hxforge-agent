name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  task010-focused:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - run: ruff format --check .
      - run: mypy
      - name: Run TASK-010 tests
        run: |
          pytest -x --timeout=120 \
            tests/unit/test_task010_final.py \
            tests/unit/test_task010_phase1.py \
            tests/unit/test_task010_phase2.py
      - run: pip-audit

  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Run integration tests
        run: pytest -x --timeout=120 tests/integration/

  repository-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Run full repository tests
        run: |
          pytest -x --timeout=120 \
            --ignore=tests/unit/test_double_pipe_correction_r10.py \
            --ignore=tests/unit/test_double_pipe_correction_r12.py \
            -q
