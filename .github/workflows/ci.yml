name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - name: Verify uv version
        run: test "$(uv --version | cut -d' ' -f2 | sed 's/[-+].*//')" = "0.11.25"
      - name: Check lock freshness
        run: uv lock --check
      - name: Install from lock
        run: uv sync --locked --all-extras
      - name: Verify no lock drift
        run: git diff --exit-code -- uv.lock pyproject.toml
      - run: uv run --locked ruff check .
      - run: uv run --locked ruff format --check .
      - run: uv run --locked mypy src/hexagent tests/support/property_provider_doubles.py tests/support/test_property_provider_doubles.py
      - run: uv run --locked pip-audit

  parse-manifest:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
      shard-count: ${{ steps.parse.outputs.shard-count }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - name: Parse manifest to JSON matrix
        id: parse
        run: |
          uv run --locked python -m tests.ci.verify_manifest \
            --manifest ci-shard-manifest.yml \
            --test-root tests \
          | uv run --locked python -c "
          import sys, json
          data = json.load(sys.stdin)
          if data['status'] != 'pass':
              print(f'Manifest verification failed: {data.get(\"error\", \"unknown\")}', file=sys.stderr)
              sys.exit(1)
          matrix = data['matrix']
          print(f'matrix={json.dumps(matrix)}')
          print(f'shard-count={len(matrix[\"include\"])}')
          " >> "$GITHUB_OUTPUT"

  verify-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Verify manifest D == M
        run: |
          uv run --locked python -m tests.ci.verify_manifest \
            --manifest ci-shard-manifest.yml \
            --test-root tests

  # ── PR-head shard jobs ─────────────────────────────────────────────────────
  shard:
    needs: [parse-manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.parse-manifest.outputs.matrix) }}
    env:
      PYTHONHASHSEED: "0"
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
    steps:
      - name: Determine track and commit SHA
        id: track
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "track=main" >> "$GITHUB_OUTPUT"
            echo "commit-sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "track=pr-head" >> "$GITHUB_OUTPUT"
            echo "commit-sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.track.outputs.commit-sha }}
      - name: Assert checkout SHA
        run: |
          test "$(git rev-parse HEAD)" = "${{ steps.track.outputs.commit-sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Record start time
        id: timing
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"
      - name: Run shard
        run: |
          TRACK="${{ steps.track.outputs.track }}"
          SHARD="${{ matrix.name }}"
          PYVER="${{ matrix.python }}"
          ATTEMPT="${{ github.run_attempt }}"
          COV_RAW="coverage-raw.${TRACK}.${SHARD}.py${PYVER}.attempt${ATTEMPT}"
          set +e
          uv run --locked pytest --timeout=${{ matrix.timeout }} -q \
            -p tests.ci.collect_nodes_plugin \
            --hx-collection-scope shard \
            --hx-shard "${SHARD}" \
            --hx-node-output "node-inventory.json" \
            --junitxml="junit.xml" \
            --cov=src --cov-report=xml:coverage.xml \
            --tb=short \
            ${{ matrix.files }} \
            2>collection-stderr.txt
          PYTEST_EXIT=$?
          set -e
          echo "pytest_exit_code=${PYTEST_EXIT}" >> "$GITHUB_OUTPUT"
          if [ -f ".coverage" ] && [ -s ".coverage" ]; then
            mv ".coverage" "${COV_RAW}"
          else
            touch "${COV_RAW}"
          fi
          test -s "junit.xml"
          test -s "node-inventory.json"
          test -s "coverage.xml"
          test -s "${COV_RAW}"
          exit "${PYTEST_EXIT}"
        id: pytest
        env:
          PYTHONPATH: "."
          HX_TRACK: ${{ steps.track.outputs.track }}
          HX_COMMIT_SHA: ${{ steps.track.outputs.commit-sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
      - name: Capture resource telemetry
        if: always()
        run: |
          END=$(date +%s)
          START=${{ steps.timing.outputs.start }}
          DURATION=$((END - START))
          TRACK="${{ steps.track.outputs.track }}"
          SHARD="${{ matrix.name }}"
          PYVER="${{ matrix.python }}"
          ATTEMPT="${{ github.run_attempt }}"
          COV_RAW="coverage-raw.${TRACK}.${SHARD}.py${PYVER}.attempt${ATTEMPT}"
          uv run --locked python -c "
          import json, os, xml.etree.ElementTree as ET
          duration = int('${DURATION}')
          exit_code = int(os.environ.get('PYTEST_EXIT_CODE', '-1'))
          tests_collected = tests_passed = tests_failed = tests_skipped = tests_xfailed = tests_xpassed = 0
          junit = 'junit.xml'
          if os.path.exists(junit):
              try:
                  root = ET.parse(junit).getroot()
                  for tc in root.iter('testcase'):
                      tests_passed += 1
                      if tc.find('failure') is not None:
                          tests_failed += 1; tests_passed -= 1
                      if tc.find('error') is not None:
                          tests_failed += 1; tests_passed -= 1
                      if tc.find('skipped') is not None:
                          tests_skipped += 1; tests_passed -= 1
                  ts = root.attrib
                  tests_collected = int(ts.get('tests', tests_passed + tests_failed + tests_skipped))
              except Exception:
                  pass
          cpu_user = cpu_sys = 0.0
          peak_rss = 0
          try:
              import resource
              r = resource.getrusage(resource.RUSAGE_SELF)
              cpu_user = r.ru_utime
              cpu_sys = r.ru_stime
              peak_rss = r.ru_maxrss
          except Exception:
              pass
          telemetry = {
              'track': '${{ steps.track.outputs.track }}',
              'commit_sha': '${{ steps.track.outputs.commit-sha }}',
              'run_id': '${{ github.run_id }}',
              'run_attempt': int('${{ github.run_attempt }}'),
              'python_version': '${{ matrix.python }}',
              'shard': '${{ matrix.name }}',
              'wall_clock_seconds': duration,
              'cpu_user_seconds': cpu_user,
              'cpu_system_seconds': cpu_sys,
              'peak_rss_kb': peak_rss,
              'pytest_exit_code': exit_code,
              'tests_collected': tests_collected,
              'tests_passed': tests_passed,
              'tests_failed': tests_failed,
              'tests_skipped': tests_skipped,
              'tests_xfailed': tests_xfailed,
              'tests_xpassed': tests_xpassed,
          }
          with open('resource-telemetry.json', 'w') as f:
              json.dump(telemetry, f, indent=2, sort_keys=True)
          "
      - name: Prepare artifact metadata
        if: always()
        run: |
          TRACK="${{ steps.track.outputs.track }}"
          SHARD="${{ matrix.name }}"
          PYVER="${{ matrix.python }}"
          ATTEMPT="${{ github.run_attempt }}"
          COV_RAW="coverage-raw.${TRACK}.${SHARD}.py${PYVER}.attempt${ATTEMPT}"
          uv run --locked python -c "
          import json, os
          meta = {
              'identity': {
                  'track': '${{ steps.track.outputs.track }}',
                  'commit_sha': '${{ steps.track.outputs.commit-sha }}',
                  'run_id': '${{ github.run_id }}',
                  'run_attempt': int('${{ github.run_attempt }}'),
                  'python_version': '${{ matrix.python }}',
                  'shard': '${{ matrix.name }}',
              },
              'artifacts': [],
          }
          required = [
              ('node-inventory', 'node-inventory.json'),
              ('junit', 'junit.xml'),
              ('coverage-raw', '${COV_RAW}'),
              ('coverage-xml', 'coverage.xml'),
              ('collection-stderr', 'collection-stderr.txt'),
              ('resource-telemetry', 'resource-telemetry.json'),
          ]
          for kind, path in required:
              exists = os.path.exists(path)
              meta['artifacts'].append({'kind': kind, 'path': path, 'present': exists})
          with open('artifact-metadata.json', 'w') as f:
              json.dump(meta, f, indent=2, sort_keys=True)
          "
      - name: Upload shard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.track.outputs.track }}-${{ matrix.name }}-py${{ matrix.python }}-attempt${{ github.run_attempt }}
          path: |
            node-inventory.json
            junit.xml
            coverage.xml
            coverage-raw.*
            artifact-metadata.json
            collection-stderr.txt
            resource-telemetry.json
          if-no-files-found: error
          retention-days: 7

  # ── Merge-ref shard jobs ───────────────────────────────────────────────────
  shard-merge-ref:
    if: github.event_name == 'pull_request'
    needs: [parse-manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.parse-manifest.outputs.matrix) }}
    env:
      PYTHONHASHSEED: "0"
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
      - name: Record and assert merge-ref SHA
        id: merge-sha
        run: |
          MERGE_SHA="$(git rev-parse HEAD)"
          test -n "$MERGE_SHA"
          echo "merge-sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
          test "$(git rev-parse HEAD)" = "$MERGE_SHA"
          echo "Merge-ref SHA: $MERGE_SHA"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Record start time
        id: timing
        run: echo "start=$(date +%s)" >> "$GITHUB_OUTPUT"
      - name: Run shard
        id: pytest
        run: |
          MERGE_SHA="${{ steps.merge-sha.outputs.merge-sha }}"
          SHARD="${{ matrix.name }}"
          PYVER="${{ matrix.python }}"
          ATTEMPT="${{ github.run_attempt }}"
          COV_RAW="coverage-raw.merge-ref.${SHARD}.py${PYVER}.attempt${ATTEMPT}"
          set +e
          uv run --locked pytest --timeout=${{ matrix.timeout }} -q \
            -p tests.ci.collect_nodes_plugin \
            --hx-collection-scope shard \
            --hx-shard "${SHARD}" \
            --hx-node-output "node-inventory.json" \
            --junitxml="junit.xml" \
            --cov=src --cov-report=xml:coverage.xml \
            --tb=short \
            ${{ matrix.files }} \
            2>collection-stderr.txt
          PYTEST_EXIT=$?
          set -e
          echo "pytest_exit_code=${PYTEST_EXIT}" >> "$GITHUB_OUTPUT"
          if [ -f ".coverage" ] && [ -s ".coverage" ]; then
            mv ".coverage" "${COV_RAW}"
          else
            touch "${COV_RAW}"
          fi
          test -s "junit.xml"
          test -s "node-inventory.json"
          test -s "coverage.xml"
          test -s "${COV_RAW}"
          exit "${PYTEST_EXIT}"
        env:
          PYTHONPATH: "."
          HX_TRACK: merge-ref
          HX_COMMIT_SHA: ${{ steps.merge-sha.outputs.merge-sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
      - name: Capture resource telemetry
        if: always()
        run: |
          END=$(date +%s)
          START=${{ steps.timing.outputs.start }}
          DURATION=$((END - START))
          MERGE_SHA="${{ steps.merge-sha.outputs.merge-sha }}"
          SHARD="${{ matrix.name }}"
          PYVER="${{ matrix.python }}"
          COV_RAW="coverage-raw.merge-ref.${SHARD}.py${PYVER}.attempt${{ github.run_attempt }}"
          uv run --locked python -c "
          import json, os, xml.etree.ElementTree as ET
          duration = int('${DURATION}')
          exit_code = int(os.environ.get('PYTEST_EXIT_CODE', '-1'))
          tests_collected = tests_passed = tests_failed = tests_skipped = tests_xfailed = tests_xpassed = 0
          junit = 'junit.xml'
          if os.path.exists(junit):
              try:
                  root = ET.parse(junit).getroot()
                  for tc in root.iter('testcase'):
                      tests_passed += 1
                      if tc.find('failure') is not None:
                          tests_failed += 1; tests_passed -= 1
                      if tc.find('error') is not None:
                          tests_failed += 1; tests_passed -= 1
                      if tc.find('skipped') is not None:
                          tests_skipped += 1; tests_passed -= 1
                  ts = root.attrib
                  tests_collected = int(ts.get('tests', tests_passed + tests_failed + tests_skipped))
              except Exception:
                  pass
          cpu_user = cpu_sys = 0.0
          peak_rss = 0
          try:
              import resource
              r = resource.getrusage(resource.RUSAGE_SELF)
              cpu_user = r.ru_utime
              cpu_sys = r.ru_stime
              peak_rss = r.ru_maxrss
          except Exception:
              pass
          telemetry = {
              'track': 'merge-ref',
              'commit_sha': '${{ steps.merge-sha.outputs.merge-sha }}',
              'run_id': '${{ github.run_id }}',
              'run_attempt': int('${{ github.run_attempt }}'),
              'python_version': '${{ matrix.python }}',
              'shard': '${{ matrix.name }}',
              'wall_clock_seconds': duration,
              'cpu_user_seconds': cpu_user,
              'cpu_system_seconds': cpu_sys,
              'peak_rss_kb': peak_rss,
              'pytest_exit_code': exit_code,
              'tests_collected': tests_collected,
              'tests_passed': tests_passed,
              'tests_failed': tests_failed,
              'tests_skipped': tests_skipped,
              'tests_xfailed': tests_xfailed,
              'tests_xpassed': tests_xpassed,
          }
          with open('resource-telemetry.json', 'w') as f:
              json.dump(telemetry, f, indent=2, sort_keys=True)
          "
      - name: Prepare artifact metadata
        if: always()
        run: |
          MERGE_SHA="${{ steps.merge-sha.outputs.merge-sha }}"
          SHARD="${{ matrix.name }}"
          PYVER="${{ matrix.python }}"
          ATTEMPT="${{ github.run_attempt }}"
          COV_RAW="coverage-raw.merge-ref.${SHARD}.py${PYVER}.attempt${ATTEMPT}"
          uv run --locked python -c "
          import json, os
          meta = {
              'identity': {
                  'track': 'merge-ref',
                  'commit_sha': '${{ steps.merge-sha.outputs.merge-sha }}',
                  'run_id': '${{ github.run_id }}',
                  'run_attempt': int('${{ github.run_attempt }}'),
                  'python_version': '${{ matrix.python }}',
                  'shard': '${{ matrix.name }}',
              },
              'artifacts': [],
          }
          required = [
              ('node-inventory', 'node-inventory.json'),
              ('junit', 'junit.xml'),
              ('coverage-raw', '${COV_RAW}'),
              ('coverage-xml', 'coverage.xml'),
              ('collection-stderr', 'collection-stderr.txt'),
              ('resource-telemetry', 'resource-telemetry.json'),
          ]
          for kind, path in required:
              exists = os.path.exists(path)
              meta['artifacts'].append({'kind': kind, 'path': path, 'present': exists})
          with open('artifact-metadata.json', 'w') as f:
              json.dump(meta, f, indent=2, sort_keys=True)
          "
      - name: Upload shard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-ref-${{ matrix.name }}-py${{ matrix.python }}-attempt${{ github.run_attempt }}
          path: |
            node-inventory.json
            junit.xml
            coverage.xml
            coverage-raw.*
            artifact-metadata.json
            collection-stderr.txt
            resource-telemetry.json
          if-no-files-found: error
          retention-days: 7

  # ── Global collection (PR-head) ────────────────────────────────────────────
  collect-global:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    env:
      PYTHONHASHSEED: "0"
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Global collection (py${{ matrix.python }})
        run: |
          uv run --locked pytest --collect-only -q \
            -p tests.ci.collect_nodes_plugin \
            --hx-collection-scope global \
            --hx-node-output "nodes-pr-head-global-py${{ matrix.python }}-attempt${{ github.run_attempt }}.json" \
            tests/ 2>collection-stderr-global.txt
        env:
          PYTHONPATH: "."
          HX_TRACK: pr-head
          HX_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
      - name: Upload global inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-head-global-py${{ matrix.python }}-attempt${{ github.run_attempt }}
          path: |
            nodes-pr-head-global-py${{ matrix.python }}-attempt${{ github.run_attempt }}.json
            collection-stderr-global.txt
          if-no-files-found: error
          retention-days: 7

  # ── Global collection (Merge-ref) ──────────────────────────────────────────
  collect-global-merge-ref:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    env:
      PYTHONHASHSEED: "0"
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
      - name: Record and assert merge-ref SHA
        id: merge-sha
        run: |
          MERGE_SHA="$(git rev-parse HEAD)"
          test -n "$MERGE_SHA"
          echo "merge-sha=$MERGE_SHA" >> "$GITHUB_OUTPUT"
          test "$(git rev-parse HEAD)" = "$MERGE_SHA"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Global collection merge-ref (py${{ matrix.python }})
        run: |
          uv run --locked pytest --collect-only -q \
            -p tests.ci.collect_nodes_plugin \
            --hx-collection-scope global \
            --hx-node-output "nodes-merge-ref-global-py${{ matrix.python }}-attempt${{ github.run_attempt }}.json" \
            tests/ 2>collection-stderr-global.txt
        env:
          PYTHONPATH: "."
          HX_TRACK: merge-ref
          HX_COMMIT_SHA: ${{ steps.merge-sha.outputs.merge-sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
      - name: Upload global inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-ref-global-py${{ matrix.python }}-attempt${{ github.run_attempt }}
          path: |
            nodes-merge-ref-global-py${{ matrix.python }}-attempt${{ github.run_attempt }}.json
            collection-stderr-global.txt
          if-no-files-found: error
          retention-days: 7

  # ── Verify completeness (PR-head) ──────────────────────────────────────────
  verify-completeness:
    if: github.event_name == 'pull_request' && needs.shard.result == 'success' && needs.collect-global.result == 'success'
    needs: [shard, collect-global, parse-manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Download shard inventories
        uses: actions/download-artifact@v4
        with:
          path: shard-inventories/
          pattern: pr-head-*-py${{ matrix.python }}-attempt*
      - name: Download global inventory
        uses: actions/download-artifact@v4
        with:
          path: global-inventory/
          pattern: pr-head-global-py${{ matrix.python }}-attempt*
      - name: Verify per-version completeness (pr-head)
        run: |
          uv run --locked python -c "
          import json, sys
          from pathlib import Path
          from tests.ci.node_inventory import load_inventory, verify_per_version
          from tests.ci.shard_manifest import load_manifest

          python_version = '${{ matrix.python }}'
          manifest = load_manifest(Path('ci-shard-manifest.yml'), repo_root=Path('.'))

          global_path = None
          for p in Path('global-inventory').rglob('*.json'):
              if 'global' in p.name and python_version in p.name:
                  global_path = p; break
          if global_path is None:
              print('ERROR: no global inventory', file=sys.stderr); sys.exit(1)
          global_inv = load_inventory(global_path)
          print(f'Global: {global_inv.node_count} nodes')

          shard_inventories = {}
          for p in Path('shard-inventories').rglob('node-inventory.json'):
              inv = load_inventory(p)
              if inv.python_version == python_version and inv.collection_scope == 'shard':
                  shard_inventories[inv.shard] = inv
                  print(f'  Shard {inv.shard}: {inv.node_count} nodes')

          verify_per_version(manifest=manifest, version=python_version,
                             global_inventory=global_inv, shard_inventories=shard_inventories)
          print(f'PR-head completeness PASS Python {python_version}')
          "

  # ── Verify completeness (Merge-ref) ────────────────────────────────────────
  verify-completeness-merge-ref:
    if: github.event_name == 'pull_request' && needs.shard-merge-ref.result == 'success' && needs.collect-global-merge-ref.result == 'success'
    needs: [shard-merge-ref, collect-global-merge-ref, parse-manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Download shard inventories
        uses: actions/download-artifact@v4
        with:
          path: shard-inventories/
          pattern: merge-ref-*-py${{ matrix.python }}-attempt*
      - name: Download global inventory
        uses: actions/download-artifact@v4
        with:
          path: global-inventory/
          pattern: merge-ref-global-py${{ matrix.python }}-attempt*
      - name: Verify per-version completeness (merge-ref)
        run: |
          uv run --locked python -c "
          import sys
          from pathlib import Path
          from tests.ci.node_inventory import load_inventory, verify_per_version
          from tests.ci.shard_manifest import load_manifest

          python_version = '${{ matrix.python }}'
          manifest = load_manifest(Path('ci-shard-manifest.yml'), repo_root=Path('.'))

          global_path = None
          for p in Path('global-inventory').rglob('*.json'):
              if 'global' in p.name and python_version in p.name:
                  global_path = p; break
          if global_path is None:
              print('ERROR: no global inventory', file=sys.stderr); sys.exit(1)
          global_inv = load_inventory(global_path)

          shard_inventories = {}
          for p in Path('shard-inventories').rglob('node-inventory.json'):
              inv = load_inventory(p)
              if inv.python_version == python_version and inv.collection_scope == 'shard':
                  shard_inventories[inv.shard] = inv

          verify_per_version(manifest=manifest, version=python_version,
                             global_inventory=global_inv, shard_inventories=shard_inventories)
          print(f'Merge-ref completeness PASS Python {python_version}')
          "

  # ── Verify golden/benchmark (PR-head) ──────────────────────────────────────
  verify-golden-benchmark:
    if: github.event_name == 'pull_request' && needs.shard.result == 'success' && needs.collect-global.result == 'success'
    needs: [shard, collect-global]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Download all inventories
        uses: actions/download-artifact@v4
        with:
          path: inventories/
          pattern: pr-head-*-attempt*
      - name: Verify golden/benchmark marker-level separation
        run: |
          uv run --locked python -c "
          import json, sys
          from pathlib import Path
          from tests.ci.node_inventory import load_inventory
          from tests.ci.shard_manifest import load_manifest

          manifest = load_manifest(Path('ci-shard-manifest.yml'), repo_root=Path('.'))
          all_shards = {}
          for p in sorted(Path('inventories').rglob('node-inventory.json')):
              inv = load_inventory(p)
              if inv.collection_scope == 'shard':
                  all_shards[inv.shard] = inv

          if not all_shards:
              print('ERROR: no shard inventories', file=sys.stderr); sys.exit(1)

          # Collect per-node markers
          golden_nodes = set()
          benchmark_nodes = set()
          non_golden_nodes = set()
          all_node_markers = {}

          for shard_name, inv in sorted(all_shards.items()):
              for node_id in inv.node_ids:
                  markers = dict(inv.node_markers).get(node_id, ()) if inv.node_markers else ()
                  marker_set = set(markers)
                  all_node_markers[node_id] = marker_set
                  if 'golden' in marker_set:
                      golden_nodes.add(node_id)
                  if 'benchmark' in marker_set:
                      benchmark_nodes.add(node_id)
                  if shard_name != 'golden':
                      non_golden_nodes.add(node_id)

          # Check: golden + benchmark mutually exclusive
          overlap = golden_nodes & benchmark_nodes
          if overlap:
              print(f'VIOLATION: {len(overlap)} nodes carry both golden and benchmark', file=sys.stderr)
              sys.exit(1)

          # Check: golden shard isolation
          golden_spec = None
          for s in manifest.shards:
              if s.name == 'golden':
                  golden_spec = s; break
          if golden_spec:
              golden_shard_inv = all_shards.get('golden')
              if golden_shard_inv:
                  # Every golden node must be in golden shard
                  golden_shard_node_set = set(golden_shard_inv.node_ids)
                  golden_in_other = golden_nodes - golden_shard_node_set
                  if golden_in_other:
                      print(f'VIOLATION: golden nodes outside golden shard: {len(golden_in_other)}', file=sys.stderr)
                      sys.exit(1)
                  # No non-golden node in golden shard
                  non_golden_in_golden = non_golden_nodes & golden_shard_node_set
                  if non_golden_in_golden:
                      print(f'VIOLATION: non-golden nodes in golden shard: {len(non_golden_in_golden)}', file=sys.stderr)
                      sys.exit(1)

          # Check: no benchmark in PR-blocking shards
          pr_blocking = {s.name for s in manifest.shards}
          benchmark_in_pr = benchmark_nodes & set().union(*(set(all_shards[s].node_ids) for s in pr_blocking if s in all_shards))
          if benchmark_in_pr:
              print(f'VIOLATION: benchmark nodes in PR-blocking shards: {len(benchmark_in_pr)}', file=sys.stderr)
              sys.exit(1)

          total_nodes = sum(inv.node_count for inv in all_shards.values())
          print(f'Golden nodes: {len(golden_nodes)}')
          print(f'Benchmark nodes: {len(benchmark_nodes)}')
          print(f'Total nodes: {total_nodes}')
          print(f'Golden+benchmark overlap: 0')
          print(f'Golden shard isolation: PASS')
          print(f'Benchmark PR-blocking exclusion: PASS')
          print(f'Marker-level golden/benchmark separation: PASS')
          "

  # ── Aggregate (PR-head) ────────────────────────────────────────────────────
  aggregate:
    needs: [shard, lint, verify-manifest]
    if: always() && needs.shard.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Download shard artifacts for this track
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false
          pattern: ${{ github.event_name == 'push' && 'main-*' || 'pr-head-*' }}
      - name: Validate artifact identity and completeness
        run: |
          TRACK="${{ github.event_name == 'push' && 'main' || 'pr-head' }}"
          COMMIT_SHA="${{ github.event_name == 'push' && github.sha || github.event.pull_request.head.sha }}"
          uv run --locked python -c "
          import json, os, sys
          from pathlib import Path

          track = '${{ github.event_name == 'push' && 'main' || 'pr-head' }}'
          commit_sha = '${{ github.event_name == 'push' && github.sha || github.event.pull_request.head.sha }}'
          run_id = '${{ github.run_id }}'
          run_attempt = int('${{ github.run_attempt }}')

          import yaml
          with open('ci-shard-manifest.yml') as f:
              manifest = yaml.safe_load(f)

          expected = set()
          for shard in manifest['shards']:
              for py in shard['python']:
                  expected.add((track, shard['name'], py, run_id, run_attempt, commit_sha))

          required_kinds = {'node-inventory', 'junit', 'coverage-raw', 'coverage-xml', 'collection-stderr', 'resource-telemetry'}

          found = set()
          artifact_dir = Path('artifacts')
          for artifact_path in sorted(artifact_dir.rglob('artifact-metadata.json')):
              meta = json.loads(artifact_path.read_text())
              identity = meta['identity']
              key = (identity['track'], identity['shard'], identity['python_version'],
                     str(identity['run_id']), int(identity['run_attempt']), identity['commit_sha'])
              if key in found:
                  print(f'DUPLICATE: {key}', file=sys.stderr); sys.exit(1)
              found.add(key)
              # Verify artifact kinds
              declared = {a['kind'] for a in meta['artifacts']}
              missing_kinds = required_kinds - declared
              extra_kinds = declared - required_kinds
              if missing_kinds:
                  print(f'MISSING KINDS in {key}: {sorted(missing_kinds)}', file=sys.stderr); sys.exit(1)
              if extra_kinds:
                  print(f'EXTRA KINDS in {key}: {sorted(extra_kinds)}', file=sys.stderr); sys.exit(1)
              # Verify each declared artifact is present
              for a in meta['artifacts']:
                  if not a['present']:
                      print(f'ABSENT ARTIFACT: {a[\"kind\"]} in {key}', file=sys.stderr); sys.exit(1)

          missing = expected - found
          extra = found - expected
          if missing:
              print(f'MISSING: {sorted(missing)}', file=sys.stderr); sys.exit(1)
          if extra:
              print(f'UNEXPECTED: {sorted(extra)}', file=sys.stderr); sys.exit(1)
          print(f'Artifact identity gate PASS: {len(found)} producers, all kinds verified')
          "
      - name: Combine coverage
        run: |
          uv run --locked python -c "
          import shutil, sys, os
          from pathlib import Path
          combine_dir = Path('coverage-combine')
          combine_dir.mkdir(exist_ok=True)
          found = []
          for f in sorted(Path('artifacts').rglob('coverage-raw.*')):
              dest = combine_dir / f.name
              shutil.copy2(f, dest)
              found.append(str(f))
          if not found:
              print('ERROR: No coverage-raw files found in artifacts/', file=sys.stderr)
              print(f'artifacts/ contents: {list(Path(\"artifacts\").rglob(\"*\"))[:20]}', file=sys.stderr)
              sys.exit(1)
          print(f'Found {len(found)} coverage files')
          for f in found:
              print(f'  {f}')
          "
          uv run --locked coverage combine coverage-combine/
          uv run --locked coverage xml
          uv run --locked coverage report

  # ── Aggregate (Merge-ref) ──────────────────────────────────────────────────
  merge-ref-aggregate:
    if: github.event_name == 'pull_request' && needs.shard-merge-ref.result == 'success'
    needs: [shard-merge-ref, lint, verify-manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Download merge-ref shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: false
          pattern: merge-ref-*
      - name: Validate merge-ref artifact identity
        run: |
          uv run --locked python -c "
          import json, sys
          from pathlib import Path

          run_id = '${{ github.run_id }}'
          run_attempt = int('${{ github.run_attempt }}')

          import yaml
          with open('ci-shard-manifest.yml') as f:
              manifest = yaml.safe_load(f)

          # We don't know the exact merge SHA here, but we verify all producers
          # share the same commit_sha (which IS the merge SHA)
          found_shas = set()
          expected = set()
          for shard in manifest['shards']:
              for py in shard['python']:
                  expected.add(('merge-ref', shard['name'], py, run_id, run_attempt))

          found = set()
          artifact_dir = Path('artifacts')
          for artifact_path in sorted(artifact_dir.rglob('artifact-metadata.json')):
              meta = json.loads(artifact_path.read_text())
              identity = meta['identity']
              key = (identity['track'], identity['shard'], identity['python_version'],
                     str(identity['run_id']), int(identity['run_attempt']))
              found.add(key)
              found_shas.add(identity['commit_sha'])

          if len(found_shas) != 1:
              print(f'MERGE-SHA INCONSISTENCY: {len(found_shas)} different SHAs: {found_shas}', file=sys.stderr)
              sys.exit(1)

          missing = expected - found
          if missing:
              print(f'MISSING: {sorted(missing)}', file=sys.stderr); sys.exit(1)
          print(f'Merge-ref artifact identity gate PASS: {len(found)} producers, merge SHA={found_shas.pop()}')
          "
      - name: Combine merge-ref coverage
        run: |
          uv run --locked python -c "
          import shutil, sys
          from pathlib import Path
          combine_dir = Path('coverage-combine')
          combine_dir.mkdir(exist_ok=True)
          found = []
          for f in sorted(Path('artifacts').rglob('coverage-raw.*')):
              shutil.copy2(f, combine_dir / f.name)
              found.append(str(f))
          if not found:
              print('ERROR: No coverage-raw files found', file=sys.stderr)
              sys.exit(1)
          print(f'Found {len(found)} coverage files')
          "
          uv run --locked coverage combine coverage-combine/
          uv run --locked coverage xml -o merge-ref-coverage.xml
          uv run --locked coverage report

  # ── Final gate (PR-head) ───────────────────────────────────────────────────
  final-gate:
    if: always()
    needs:
      - lint
      - parse-manifest
      - verify-manifest
      - shard
      - collect-global
      - collect-global-merge-ref
      - verify-completeness
      - verify-completeness-merge-ref
      - verify-golden-benchmark
      - aggregate
      - merge-ref-aggregate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check all required gates
        run: |
          FAILED=0
          check() {
            name="$1"; result="$2"
            if [ "$result" != "success" ]; then
              echo "FAIL: $name = $result" >&2
              FAILED=1
            else
              echo "PASS: $name = success"
            fi
          }
          check "lint" "${{ needs.lint.result }}"
          check "parse-manifest" "${{ needs.parse-manifest.result }}"
          check "verify-manifest" "${{ needs.verify-manifest.result }}"
          check "shard" "${{ needs.shard.result }}"
          check "collect-global" "${{ needs.collect-global.result }}"
          check "verify-completeness" "${{ needs.verify-completeness.result }}"
          check "verify-golden-benchmark" "${{ needs.verify-golden-benchmark.result }}"
          check "aggregate" "${{ needs.aggregate.result }}"
          check "verify-completeness-merge-ref" "${{ needs.verify-completeness-merge-ref.result }}"
          check "merge-ref-aggregate" "${{ needs.merge-ref-aggregate.result }}"
          if [ "$FAILED" -ne 0 ]; then
            echo "FINAL GATE: FAILED" >&2
            exit 1
          fi
          echo "FINAL GATE: ALL PASSED"
