name: ci

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - run: ruff check .
      - name: Run mypy
        id: mypy
        shell: bash
        run: |
          set -o pipefail
          mypy 2>&1 | tee mypy-errors.txt
      - name: Upload mypy errors
        if: failure() && steps.mypy.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: mypy-errors-${{ matrix.python-version }}
          path: mypy-errors.txt
      - run: pytest --cov=hexagent --cov-report=term-missing
      - run: pip-audit
