  # ── Verify golden/benchmark: PR-head (P0-6 rewritten) ────────────────────
  verify-golden-benchmark:
    if: github.event_name == 'pull_request' && needs.shard.result == 'success' && needs.collect-global.result == 'success'
    needs: [shard, collect-global]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Download all inventories
        uses: actions/download-artifact@v4
        with:
          path: inventories/
          pattern: pr-head-*-attempt*
      - name: Verify golden/benchmark per-Python ownership
        run: |
          uv run --locked python -c "
          import json, sys
          from pathlib import Path
          from tests.ci.node_inventory import load_inventory

          all_per_python: dict[str, dict[str, object]] = {}
          for p in sorted(Path('inventories').rglob('node-inventory.json')):
              inv = load_inventory(p)
              if inv.collection_scope == 'shard':
                  key = (inv.python_version, inv.shard)
                  all_per_python.setdefault(inv.python_version, {})[inv.shard] = inv

          if not all_per_python:
              print('ERROR: no shard inventories', file=sys.stderr); sys.exit(1)

          for py, shards in sorted(all_per_python.items()):
              golden_nodes: set[str] = set()
              benchmark_nodes: set[str] = set()
              all_nodes: dict[str, set[str]] = {}

              for shard_name, inv in sorted(shards.items()):
                  for nid in inv.node_ids:
                      all_nodes.setdefault(nid, set()).add(shard_name)
                      markers_map = dict(inv.node_markers) if inv.node_markers else {}
                      marker_set = set(markers_map.get(nid, ()))
                      if 'golden' in marker_set:
                          golden_nodes.add(nid)
                      if 'benchmark' in marker_set:
                          benchmark_nodes.add(nid)

              # Check: golden + benchmark mutually exclusive
              overlap = golden_nodes & benchmark_nodes
              if overlap:
                  print(f'VIOLATION Python {py}: {len(overlap)} nodes carry both golden and benchmark', file=sys.stderr)
                  sys.exit(1)

              # Check: golden shard isolation per-Python
              golden_shard_nodes = set()
              if 'golden' in shards:
                  golden_shard_inv = shards['golden']
                  golden_shard_nodes = set(golden_shard_inv.node_ids)

              golden_in_other = golden_nodes - golden_shard_nodes
              if golden_in_other:
                  print(f'VIOLATION Python {py}: {len(golden_in_other)} golden nodes outside golden shard', file=sys.stderr)
                  sys.exit(1)

              # No non-golden node in golden shard
              non_golden_in_golden = golden_shard_nodes - golden_nodes
              if non_golden_in_golden:
                  print(f'VIOLATION Python {py}: {len(non_golden_in_golden)} non-golden nodes in golden shard', file=sys.stderr)
                  sys.exit(1)

              # Check: no benchmark in PR-blocking shards
              pr_shards = {name for name in shards}
              benchmark_in_pr = set()
              for nid in benchmark_nodes:
                  if nid in all_nodes and all_nodes[nid] & pr_shards:
                      benchmark_in_pr.add(nid)
              if benchmark_in_pr:
                  print(f'VIOLATION Python {py}: {len(benchmark_in_pr)} benchmark nodes in PR shards', file=sys.stderr)
                  sys.exit(1)

              # Per-node marker coverage: every node must have markers
              for nid in all_nodes:
                  pass  # markers are optional in v1

              total = sum(inv.node_count for inv in shards.values())
              print(f'Python {py}: golden={len(golden_nodes)} benchmark={len(benchmark_nodes)} total={total} PASS')

          print('Golden/benchmark per-Python separation: PASS')
          "

