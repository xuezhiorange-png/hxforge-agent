name: ci

"on":
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ── Shared: lint ───────────────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - name: Verify uv version
        run: test "$(uv --version | cut -d' ' -f2 | sed 's/[-+].*//')" = "0.11.25"
      - name: Check lock freshness
        run: uv lock --check
      - name: Install from lock
        run: uv sync --locked --all-extras
      - name: Verify no lock drift
        run: git diff --exit-code -- uv.lock pyproject.toml
      - run: uv run --locked ruff check .
      - run: uv run --locked ruff format --check .
      - run: uv run --locked mypy src/hexagent tests/support/property_provider_doubles.py tests/support/test_property_provider_doubles.py
      - run: uv run --locked pip-audit

  # ── Shared: parse manifest ────────────────────────────────────────────────
  parse-manifest:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
      shard-count: ${{ steps.parse.outputs.shard-count }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - name: Parse manifest to JSON matrix
        id: parse
        run: |
          uv run --locked python -m tests.ci.verify_manifest \
            --manifest ci-shard-manifest.yml \
            --test-root tests \
          | uv run --locked python -c "
          import sys, json
          data = json.load(sys.stdin)
          if data['status'] != 'pass':
              print(f'Manifest verification failed: {data.get(\"error\", \"unknown\")}', file=sys.stderr)
              sys.exit(1)
          matrix = data['matrix']
          print(f'matrix={json.dumps(matrix)}')
          print(f'shard-count={len(matrix[\"include\"])}')
          " >> "$GITHUB_OUTPUT"

  # ── Shared: verify manifest D == M ────────────────────────────────────────
  verify-manifest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Verify manifest D == M
        run: |
          uv run --locked python -m tests.ci.verify_manifest \
            --manifest ci-shard-manifest.yml \
            --test-root tests

  # ── PR-only: resolve-authority (freeze merge SHA) ─────────────────────────
  resolve-authority:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      merge-sha: ${{ steps.resolve.outputs.merge-sha }}
      pr-head-sha: ${{ steps.resolve.outputs.pr-head-sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Resolve and freeze merge-ref SHA
        id: resolve
        run: |
          PR_HEAD="${{ github.event.pull_request.head.sha }}"
          echo "pr-head-sha=${PR_HEAD}" >> "$GITHUB_OUTPUT"
          # Fetch the exact merge ref
          git fetch origin refs/pull/${{ github.event.pull_request.number }}/merge
          MERGE_SHA="$(git rev-parse FETCH_HEAD)"
          echo "merge-sha=${MERGE_SHA}" >> "$GITHUB_OUTPUT"
          echo "Frozen merge-ref SHA: ${MERGE_SHA}"
          echo "PR head SHA: ${PR_HEAD}"

  # ── PR-head shard jobs ────────────────────────────────────────────────────
  shard:
    if: github.event_name == 'pull_request'
    needs: [parse-manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.parse-manifest.outputs.matrix) }}
    env:
      PYTHONHASHSEED: "0"
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Assert checkout SHA
        run: test "$(git rev-parse HEAD)" = "${{ github.event.pull_request.head.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Run shard with real telemetry
        id: pytest
        env:
          PYTHONPATH: "."
          TRACK: pr-head
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          PYTHON_VERSION: ${{ matrix.python }}
          SHARD: ${{ matrix.name }}
          PYTEST_TIMEOUT: ${{ matrix.timeout }}
          HX_TRACK: pr-head
          HX_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set +e
          uv run --locked python -m tests.ci.run_test_shard \
            --timeout=${{ matrix.timeout }} -q \
            -p tests.ci.collect_nodes_plugin \
            --hx-collection-scope shard \
            --hx-shard "${{ matrix.name }}" \
            --hx-node-output "node-inventory.json" \
            --junitxml="junit.xml" \
            --cov=src --cov-report=xml:coverage.xml \
            --tb=short \
            ${{ matrix.files }}
          PYTEST_EXIT=$?
          set -e
          echo "pytest_exit_code=${PYTEST_EXIT}" >> "$GITHUB_OUTPUT"
          COV_RAW="coverage-raw.pr-head.${{ matrix.name }}.py${{ matrix.python }}.attempt${{ github.run_attempt }}"
          if [ -f ".coverage" ] && [ -s ".coverage" ]; then
            mv ".coverage" "${COV_RAW}"
          else
            touch "${COV_RAW}"
          fi
          test -s "junit.xml"
          test -s "node-inventory.json"
          test -s "coverage.xml"
          test -s "${COV_RAW}"
          test -s "resource-telemetry.json"
          test -s "node-marker-inventory.json"
          exit "${PYTEST_EXIT}"
      - name: Prepare artifact metadata
        if: always()
        run: |
          COV_RAW="coverage-raw.pr-head.${{ matrix.name }}.py${{ matrix.python }}.attempt${{ github.run_attempt }}"
          uv run --locked python -c "
          import json, os
          meta = {
              'identity': {
                  'track': 'pr-head',
                  'commit_sha': '${{ github.event.pull_request.head.sha }}',
                  'run_id': '${{ github.run_id }}',
                  'run_attempt': int('${{ github.run_attempt }}'),
                  'python_version': '${{ matrix.python }}',
                  'shard': '${{ matrix.name }}',
              },
              'artifacts': [],
          }
          required = [
              ('node-inventory', 'node-inventory.json'),
              ('junit', 'junit.xml'),
              ('coverage-raw', '${COV_RAW}'),
              ('coverage-xml', 'coverage.xml'),
              ('pytest-stderr', 'pytest-stderr.txt'),
              ('resource-telemetry', 'resource-telemetry.json'),
          ]
          for kind, path in required:
              exists = os.path.exists(path)
              meta['artifacts'].append({'kind': kind, 'path': path, 'present': exists})
          with open('artifact-metadata.json', 'w') as f:
              json.dump(meta, f, indent=2, sort_keys=True)
          "
      - name: Upload shard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-head-${{ github.event.pull_request.head.sha }}-${{ github.run_id }}-attempt${{ github.run_attempt }}-py${{ matrix.python }}-${{ matrix.name }}-producer-bundle
          path: |
            node-inventory.json
            junit.xml
            coverage.xml
            coverage-raw.*
            artifact-metadata.json
            pytest-stderr.txt
            resource-telemetry.json
            node-marker-inventory.json
          if-no-files-found: error
          retention-days: 7

  # ── Merge-ref shard jobs ──────────────────────────────────────────────────
  shard-merge-ref:
    if: github.event_name == 'pull_request'
    needs: [parse-manifest, resolve-authority]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.parse-manifest.outputs.matrix) }}
    env:
      PYTHONHASHSEED: "0"
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-authority.outputs.merge-sha }}
      - name: Assert frozen merge-ref SHA
        run: |
          test "$(git rev-parse HEAD)" = "${{ needs.resolve-authority.outputs.merge-sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Run shard with real telemetry
        id: pytest
        env:
          PYTHONPATH: "."
          TRACK: merge-ref
          COMMIT_SHA: ${{ needs.resolve-authority.outputs.merge-sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          PYTHON_VERSION: ${{ matrix.python }}
          SHARD: ${{ matrix.name }}
          PYTEST_TIMEOUT: ${{ matrix.timeout }}
          HX_TRACK: merge-ref
          HX_COMMIT_SHA: ${{ needs.resolve-authority.outputs.merge-sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set +e
          uv run --locked python -m tests.ci.run_test_shard \
            --timeout=${{ matrix.timeout }} -q \
            -p tests.ci.collect_nodes_plugin \
            --hx-collection-scope shard \
            --hx-shard "${{ matrix.name }}" \
            --hx-node-output "node-inventory.json" \
            --junitxml="junit.xml" \
            --cov=src --cov-report=xml:coverage.xml \
            --tb=short \
            ${{ matrix.files }}
          PYTEST_EXIT=$?
          set -e
          echo "pytest_exit_code=${PYTEST_EXIT}" >> "$GITHUB_OUTPUT"
          COV_RAW="coverage-raw.merge-ref.${{ matrix.name }}.py${{ matrix.python }}.attempt${{ github.run_attempt }}"
          if [ -f ".coverage" ] && [ -s ".coverage" ]; then
            mv ".coverage" "${COV_RAW}"
          else
            touch "${COV_RAW}"
          fi
          test -s "junit.xml"
          test -s "node-inventory.json"
          test -s "coverage.xml"
          test -s "${COV_RAW}"
          test -s "resource-telemetry.json"
          test -s "node-marker-inventory.json"
          exit "${PYTEST_EXIT}"
      - name: Prepare artifact metadata
        if: always()
        run: |
          COV_RAW="coverage-raw.merge-ref.${{ matrix.name }}.py${{ matrix.python }}.attempt${{ github.run_attempt }}"
          uv run --locked python -c "
          import json, os
          meta = {
              'identity': {
                  'track': 'merge-ref',
                  'commit_sha': '${{ needs.resolve-authority.outputs.merge-sha }}',
                  'run_id': '${{ github.run_id }}',
                  'run_attempt': int('${{ github.run_attempt }}'),
                  'python_version': '${{ matrix.python }}',
                  'shard': '${{ matrix.name }}',
              },
              'artifacts': [],
          }
          required = [
              ('node-inventory', 'node-inventory.json'),
              ('junit', 'junit.xml'),
              ('coverage-raw', '${COV_RAW}'),
              ('coverage-xml', 'coverage.xml'),
              ('pytest-stderr', 'pytest-stderr.txt'),
              ('resource-telemetry', 'resource-telemetry.json'),
          ]
          for kind, path in required:
              exists = os.path.exists(path)
              meta['artifacts'].append({'kind': kind, 'path': path, 'present': exists})
          with open('artifact-metadata.json', 'w') as f:
              json.dump(meta, f, indent=2, sort_keys=True)
          "
      - name: Upload shard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-ref-${{ needs.resolve-authority.outputs.merge-sha }}-${{ github.run_id }}-attempt${{ github.run_attempt }}-py${{ matrix.python }}-${{ matrix.name }}-producer-bundle
          path: |
            node-inventory.json
            junit.xml
            coverage.xml
            coverage-raw.*
            artifact-metadata.json
            pytest-stderr.txt
            resource-telemetry.json
            node-marker-inventory.json
          if-no-files-found: error
          retention-days: 7

  # ── Main-push shard jobs ──────────────────────────────────────────────────
  shard-main:
    if: github.event_name == 'push'
    needs: [parse-manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.parse-manifest.outputs.matrix) }}
    env:
      PYTHONHASHSEED: "0"
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Assert main-push checkout SHA
        run: test "$(git rev-parse HEAD)" = "${{ github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Run shard with real telemetry
        id: pytest
        env:
          PYTHONPATH: "."
          TRACK: main
          COMMIT_SHA: ${{ github.sha }}
          RUN_ID: ${{ github.run_id }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          PYTHON_VERSION: ${{ matrix.python }}
          SHARD: ${{ matrix.name }}
          PYTEST_TIMEOUT: ${{ matrix.timeout }}
          HX_TRACK: main
          HX_COMMIT_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
        run: |
          set +e
          uv run --locked python -m tests.ci.run_test_shard \
            --timeout=${{ matrix.timeout }} -q \
            -p tests.ci.collect_nodes_plugin \
            --hx-collection-scope shard \
            --hx-shard "${{ matrix.name }}" \
            --hx-node-output "node-inventory.json" \
            --junitxml="junit.xml" \
            --cov=src --cov-report=xml:coverage.xml \
            --tb=short \
            ${{ matrix.files }}
          PYTEST_EXIT=$?
          set -e
          echo "pytest_exit_code=${PYTEST_EXIT}" >> "$GITHUB_OUTPUT"
          COV_RAW="coverage-raw.main.${{ matrix.name }}.py${{ matrix.python }}.attempt${{ github.run_attempt }}"
          if [ -f ".coverage" ] && [ -s ".coverage" ]; then
            mv ".coverage" "${COV_RAW}"
          else
            touch "${COV_RAW}"
          fi
          test -s "junit.xml"
          test -s "node-inventory.json"
          test -s "coverage.xml"
          test -s "${COV_RAW}"
          test -s "resource-telemetry.json"
          test -s "node-marker-inventory.json"
          exit "${PYTEST_EXIT}"
      - name: Prepare artifact metadata
        if: always()
        run: |
          COV_RAW="coverage-raw.main.${{ matrix.name }}.py${{ matrix.python }}.attempt${{ github.run_attempt }}"
          uv run --locked python -c "
          import json, os
          meta = {
              'identity': {
                  'track': 'main',
                  'commit_sha': '${{ github.sha }}',
                  'run_id': '${{ github.run_id }}',
                  'run_attempt': int('${{ github.run_attempt }}'),
                  'python_version': '${{ matrix.python }}',
                  'shard': '${{ matrix.name }}',
              },
              'artifacts': [],
          }
          required = [
              ('node-inventory', 'node-inventory.json'),
              ('junit', 'junit.xml'),
              ('coverage-raw', '${COV_RAW}'),
              ('coverage-xml', 'coverage.xml'),
              ('pytest-stderr', 'pytest-stderr.txt'),
              ('resource-telemetry', 'resource-telemetry.json'),
          ]
          for kind, path in required:
              exists = os.path.exists(path)
              meta['artifacts'].append({'kind': kind, 'path': path, 'present': exists})
          with open('artifact-metadata.json', 'w') as f:
              json.dump(meta, f, indent=2, sort_keys=True)
          "
      - name: Upload shard artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-${{ github.sha }}-${{ github.run_id }}-attempt${{ github.run_attempt }}-py${{ matrix.python }}-${{ matrix.name }}-producer-bundle
          path: |
            node-inventory.json
            junit.xml
            coverage.xml
            coverage-raw.*
            artifact-metadata.json
            pytest-stderr.txt
            resource-telemetry.json
            node-marker-inventory.json
          if-no-files-found: error
          retention-days: 7

  # ── Global collection: PR-head ────────────────────────────────────────────
  collect-global:
    if: github.event_name == 'pull_request'
    needs: [resolve-authority]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    env:
      PYTHONHASHSEED: "0"
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Global collection (py${{ matrix.python }})
        run: |
          uv run --locked pytest --collect-only -q \
            -p tests.ci.collect_nodes_plugin \
            --hx-collection-scope global \
            --hx-node-output "nodes-pr-head-global-py${{ matrix.python }}-attempt${{ github.run_attempt }}.json" \
            tests/ 2>collection-stderr-global.txt
        env:
          PYTHONPATH: "."
          HX_TRACK: pr-head
          HX_COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
      - name: Upload global inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-head-global-py${{ matrix.python }}-attempt${{ github.run_attempt }}
          path: |
            nodes-pr-head-global-py${{ matrix.python }}-attempt${{ github.run_attempt }}.json
            collection-stderr-global.txt
          if-no-files-found: error
          retention-days: 7

  # ── Global collection: Merge-ref ──────────────────────────────────────────
  collect-global-merge-ref:
    if: github.event_name == 'pull_request'
    needs: [resolve-authority]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    env:
      PYTHONHASHSEED: "0"
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve-authority.outputs.merge-sha }}
      - name: Assert frozen merge-ref SHA
        run: |
          test "$(git rev-parse HEAD)" = "${{ needs.resolve-authority.outputs.merge-sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Global collection merge-ref (py${{ matrix.python }})
        run: |
          uv run --locked pytest --collect-only -q \
            -p tests.ci.collect_nodes_plugin \
            --hx-collection-scope global \
            --hx-node-output "nodes-merge-ref-global-py${{ matrix.python }}-attempt${{ github.run_attempt }}.json" \
            tests/ 2>collection-stderr-global.txt
        env:
          PYTHONPATH: "."
          HX_TRACK: merge-ref
          HX_COMMIT_SHA: ${{ needs.resolve-authority.outputs.merge-sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
      - name: Upload global inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: merge-ref-global-py${{ matrix.python }}-attempt${{ github.run_attempt }}
          path: |
            nodes-merge-ref-global-py${{ matrix.python }}-attempt${{ github.run_attempt }}.json
            collection-stderr-global.txt
          if-no-files-found: error
          retention-days: 7

  # ── Global collection: Main-push ──────────────────────────────────────────
  collect-global-main:
    if: github.event_name == 'push'
    needs: [parse-manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    env:
      PYTHONHASHSEED: "0"
      TZ: "UTC"
      LC_ALL: "C.UTF-8"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}
      - name: Assert main-push checkout SHA
        run: test "$(git rev-parse HEAD)" = "${{ github.sha }}"
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Global collection main (py${{ matrix.python }})
        run: |
          uv run --locked pytest --collect-only -q \
            -p tests.ci.collect_nodes_plugin \
            --hx-collection-scope global \
            --hx-node-output "nodes-main-global-py${{ matrix.python }}-attempt${{ github.run_attempt }}.json" \
            tests/ 2>collection-stderr-global.txt
        env:
          PYTHONPATH: "."
          HX_TRACK: main
          HX_COMMIT_SHA: ${{ github.sha }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_RUN_ATTEMPT: ${{ github.run_attempt }}
      - name: Upload global inventory
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: main-global-py${{ matrix.python }}-attempt${{ github.run_attempt }}
          path: |
            nodes-main-global-py${{ matrix.python }}-attempt${{ github.run_attempt }}.json
            collection-stderr-global.txt
          if-no-files-found: error
          retention-days: 7

  # ── Verify completeness: PR-head ──────────────────────────────────────────
  verify-completeness:
    if: github.event_name == 'pull_request' && needs.shard.result == 'success' && needs.collect-global.result == 'success'
    needs: [shard, collect-global, parse-manifest]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
        with:
          version: "0.11.25"
      - run: uv sync --locked --all-extras
      - name: Download shard inventories
        uses: actions/download-artifact@v4
        with:
          path: shard-inventories/
          pattern: pr-head-*-attempt*-py${{ matrix.python }}-*
      - name: Download global inventory
        uses: actions/download-artifact@v4
        with:
          path: global-inventory/
          pattern: pr-head-global-py${{ matrix.python }}-attempt*
      - name: Verify per-version completeness (pr-head)
        run: |
          uv run --locked python -c "
          import json, sys
          from pathlib import Path
          from tests.ci.node_inventory import load_inventory, verify_per_version
          from tests.ci.shard_manifest import load_manifest

          python_version = '${{ matrix.python }}'
